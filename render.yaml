services:
  - type: web
    name: standard-engineering
    runtime: node
    rootDir: .
    buildCommand: npm install && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm --prefix backend start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: CORS_ORIGINS
        value: https://www.standardengineering.me,https://standardengineering.me
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: standard-engineering
      - key: MONGODB_PRODUCTS_COLLECTION
        value: products
      - key: MONGODB_ENQUIRIES_COLLECTION
        value: enquiries
      - key: MONGODB_ADMINS_COLLECTION
        value: admins
